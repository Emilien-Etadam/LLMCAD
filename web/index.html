<!DOCTYPE html>
<html>
<head>
  <title>LLMCAD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="main.css">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon/favicon-192x192.png">
  <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
</head>
<body>
  <div class="container">

    <aside class="panel agent-sidebar" id="agent-sidebar">
      <header class="panel-header">
        <h2>Agent IA</h2>
      </header>
      <section class="agent-panel" id="agent-panel">
        <h3>Agent</h3>
        <textarea id="agent-prompt" rows="3" placeholder="Ex: crée une boîte de 50x30x10 avec un congé de 2mm"></textarea>
        <button class="send-btn" id="agent-generate-btn">Générer</button>
        <div id="agent-status"></div>
        <div id="agent-iterations" class="agent-iterations"></div>
        <button class="send-btn" id="agent-load-code-btn" disabled>Charger ce code dans l'éditeur</button>
      </section>
    </aside>

    <div class="resizer" id="resizer-1" title="Glisser pour redimensionner"></div>

    <section class="panel editor-panel" id="editor-panel">
      <header class="panel-header">
        <h1><a href="http://github.com/30hours/cadquery2web">cadquery2web</a></h1>
      </header>
      <textarea id="code-input" spellcheck="false" placeholder="Enter Build123d code here..."></textarea>
      <div class="buttons-container">
        <button class="render-btn" id="preview-btn">Run / Preview</button>
      </div>
      <div class="output-container" id="output-container">
        <div class="output-title">Output:</div>
        <pre id="output-message"></pre>
      </div>
    </section>

    <div class="resizer" id="resizer-2" title="Glisser pour redimensionner"></div>

    <section class="panel viewer-panel" id="viewer-panel">
      <div class="viewer-container right-panel" id="viewer"></div>
      <div class="export-buttons">
        <button class="render-btn" id="stl-btn">Export STL</button>
        <button class="render-btn" id="step-btn">Export STEP</button>
      </div>
    </section>

  </div>
  <script type="module" src="models.js"></script>
  <script type="module" src="main.js"></script>
  <script type="module" src="js/agent.js"></script>
</body>
</html>
